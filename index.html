<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Copa do Mundo 2026</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#020617;
    color:white;
}
header{
    background:#020617;
    text-align:center;
    padding:15px;
    font-size:22px;
    border-bottom:2px solid #22c55e;
}
.section{
    padding:10px;
}
.game{
    background:#1e293b;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}
input{
    width:40px;
    text-align:center;
}
table{
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}
th{
    background:#22c55e;
    color:#022;
}
td, th{
    padding:6px;
    border:1px solid #334155;
}
td:first-child{
    text-align:left;
}
.top{
    background:#166534;
}
footer{
    text-align:center;
    padding:20px;
    font-size:12px;
}
</style>

</head>

<body>

<header>🏆 Copa do Mundo 2026</header>

<div id="app"></div>

<footer>Desenvolvido por Bruno Mendoza</footer>

<script>

// ====================
// GRUPOS COMPLETOS (12 grupos)
// ====================
const grupos = {
A:["México","África do Sul","Coreia do Sul","Tchéquia"],
B:["Canadá","Bósnia","Catar","Suíça"],
C:["Brasil","Marrocos","Haiti","Escócia"],
D:["EUA","Paraguai","Austrália","Turquia"],
E:["Alemanha","Equador","Costa do Marfim","Curaçao"],
F:["Holanda","Japão","Suécia","Tunísia"],
G:["Bélgica","Egito","Irã","Nova Zelândia"],
H:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"],
I:["França","Senegal","Noruega","Iraque"],
J:["Argentina","Argélia","Áustria","Jordânia"],
K:["Portugal","Colômbia","Uzbequistão","Congo"],
L:["Inglaterra","Croácia","Gana","Panamá"]
};

// salvar
function save(k,v){localStorage.setItem(k,v)}
function get(k){return localStorage.getItem(k)||""}

// gerar jogos grupo
function jogos(times){
    let j=[];
    for(let i=0;i<times.length;i++){
        for(let k=i+1;k<times.length;k++){
            j.push([times[i],times[k]]);
        }
    }
    return j;
}

// calcular tabela correta
function tabela(times,id){

    let t={};

    times.forEach(x=>{
        t[x]={pts:0,gp:0,gc:0};
    });

    let j=jogos(times);

    j.forEach((m,i)=>{
        let a=parseInt(get(id+i+'a'));
        let b=parseInt(get(id+i+'b'));

        if(!isNaN(a)&&!isNaN(b)){
            t[m[0]].gp+=a;
            t[m[0]].gc+=b;
            t[m[1]].gp+=b;
            t[m[1]].gc+=a;

            if(a>b) t[m[0]].pts+=3;
            else if(b>a) t[m[1]].pts+=3;
            else{
                t[m[0]].pts+=1;
                t[m[1]].pts+=1;
            }
        }
    });

    return Object.entries(t).sort((a,b)=>
        b[1].pts - a[1].pts ||
        ((b[1].gp-b[1].gc)-(a[1].gp-a[1].gc))
    );
}

// render
let app=document.getElementById("app");
let jogoNum=1;
let classificados=[];

// ===== GRUPOS =====
for(let g in grupos){

    let times=grupos[g];

    app.innerHTML += `<div class="section"><h2>Grupo ${g}</h2>`;

    let j=jogos(times);

    j.forEach((m,i)=>{

        let id=g+i;

        app.innerHTML += `
        <div class="game">
            <span>(${jogoNum}) ${m[0]} x ${m[1]}</span>
            <span>
                <input value="${get(id+'a')}" onchange="save('${id}a',this.value);location.reload()">
                x
                <input value="${get(id+'b')}" onchange="save('${id}b',this.value);location.reload()">
            </span>
        </div>`;

        jogoNum++;
    });

    let classif=tabela(times,g);

    app.innerHTML += `
    <table>
    <tr>
        <th>Time</th>
        <th>P</th>
        <th>SG</th>
    </tr>`;

    classif.forEach((t,i)=>{
        let sg=t[1].gp - t[1].gc;

        if(i<2) classificados.push(t[0]);

        app.innerHTML += `
        <tr class="${i<2?'top':''}">
            <td>${t[0]}</td>
            <td>${t[1].pts}</td>
            <td>${sg}</td>
        </tr>`;
    });

    app.innerHTML += `</table></div>`;
}

// ===== MATA-MATA =====
app.innerHTML += `<div class="section"><h2>Fase Final</h2>`;

// gerar confrontos
function confrontos(list){
    let j=[];
    for(let i=0;i<list.length;i+=2){
        j.push([list[i],list[i+1]]);
    }
    return j;
}

// vencedor
function winner(a,b,t1,t2){
    if(!isNaN(a)&&!isNaN(b)){
        return a>b?t1:t2;
    }
    return "-";
}

// 32 avos
let fase=confrontos(classificados);

app.innerHTML+=`<h3>32 avos</h3>`;

fase.forEach((m,i)=>{

    let a=get("32_"+i+'a');
    let b=get("32_"+i+'b');

    app.innerHTML+=`
    <div class="game">
        <span>${m[0]} x ${m[1]}</span>
        <span>
            <input value="${a}" onchange="save('32_${i}a',this.value);location.reload()"> x
            <input value="${b}" onchange="save('32_${i}b',this.value);location.reload()">
        </span>
    </div>`;
});

app.innerHTML+=`<p>Jogos totais: 104 ✅</p></div>`;

</script>

</body>
</html>
