<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Copa do Mundo 2026</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#020617;
    color:white;
}

header{
    background:#020617;
    text-align:center;
    padding:15px;
    font-size:22px;
    border-bottom:2px solid #22c55e;
}

.section{
    padding:12px;
}

.game{
    background:#1e293b;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}

/* tabela */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

thead{
    background:#22c55e;
    color:#022;
}

tbody tr:nth-child(odd){
    background:#1e293b;
}

tbody tr:nth-child(even){
    background:#020617;
}

td, th{
    padding:8px;
    text-align:center;
}

td:first-child{
    text-align:left;
}

/* classificados */
.top{
    background:#166534 !important;
    font-weight:bold;
}

input{
    width:45px;
    text-align:center;
}

footer{
    text-align:center;
    padding:20px;
    font-size:12px;
}
</style>

</head>

<body>

<header>🏆 Copa do Mundo 2026</header>

<div id="app"></div>

<footer>Desenvolvido por Bruno Mendoza</footer>

<script>

// ====================
// GRUPOS (A–L)
// ====================
const grupos = {
A:["México","África do Sul","Coreia do Sul","Tchéquia"],
B:["Canadá","Bósnia","Catar","Suíça"],
C:["Brasil","Marrocos","Haiti","Escócia"],
D:["EUA","Paraguai","Austrália","Turquia"],
E:["Alemanha","Equador","Costa do Marfim","Curaçao"],
F:["Holanda","Japão","Suécia","Tunísia"],
G:["Bélgica","Egito","Irã","Nova Zelândia"],
H:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"],
I:["França","Senegal","Noruega","Iraque"],
J:["Argentina","Argélia","Áustria","Jordânia"],
K:["Portugal","Colômbia","Uzbequistão","Congo"],
L:["Inglaterra","Croácia","Gana","Panamá"]
};

// salvar
function save(k,v){localStorage.setItem(k,v)}
function get(k){return localStorage.getItem(k)||""}

// gerar confrontos
function jogos(times){
    let lista=[];
    for(let i=0;i<times.length;i++){
        for(let j=i+1;j<times.length;j++){
            lista.push([times[i],times[j]]);
        }
    }
    return lista;
}

// calcular tabela
function calcular(times,id){

    let t={};

    times.forEach(time=>{
        t[time]={pts:0,gp:0,gc:0};
    });

    let j=jogos(times);

    j.forEach((m,i)=>{
        let a=parseInt(get(id+i+"a"));
        let b=parseInt(get(id+i+"b"));

        if(!isNaN(a)&&!isNaN(b)){
            t[m[0]].gp+=a;
            t[m[0]].gc+=b;
            t[m[1]].gp+=b;
            t[m[1]].gc+=a;

            if(a>b) t[m[0]].pts+=3;
            else if(b>a) t[m[1]].pts+=3;
            else{
                t[m[0]].pts+=1;
                t[m[1]].pts+=1;
            }
        }
    });

    return Object.entries(t).sort((a,b)=>
        b[1].pts-a[1].pts ||
        ((b[1].gp-b[1].gc)-(a[1].gp-a[1].gc))
    );
}

// ====================
// RENDER
// ====================
let app=document.getElementById("app");
let jogoNum=1;

// LOOP GRUPOS
for(let g in grupos){

    let times=grupos[g];

    app.innerHTML += `<div class="section"><h2>Grupo ${g}</h2>`;

    let lista=jogos(times);

    // jogos
    lista.forEach((m,i)=>{

        let id=g+i;

        app.innerHTML += `
        <div class="game">
            <span>(${jogoNum}) ${m[0]} x ${m[1]}</span>
            <span>
                <input value="${get(id+'a')}" 
                onchange="save('${id}a',this.value);location.reload()"> x
                <input value="${get(id+'b')}" 
                onchange="save('${id}b',this.value);location.reload()">
            </span>
        </div>
        `;

        jogoNum++;
    });

    // classificação
  
let classif = calcular(times, g);

app.innerHTML += `
<table>
<thead>
<tr>
    <th>Time</th>
    <th>Pontos</th>
    <th>Saldo</th>
</tr>
</thead>
<tbody>
`;

classif.forEach((t,i)=>{

    let saldo = t[1].gp - t[1].gc;

    app.innerHTML += `
    <tr class="${i < 2 ? 'top' : ''}">
        <td>${t[0]}</td>
        <td>${t[1].pts}</td>
        <td>${saldo}</td>
    </tr>
    `;
});

// ✅ FECHAMENTO CORRETO (ESSENCIAL)
app.innerHTML += `
</tbody>
</table>
`;


    app.innerHTML += `</tbody></table></div>`;
}

// ====================
// FASE FINAL (LIMPA)
// ====================
app.innerHTML += `
<div class="section">
<h2>Fase Eliminatória</h2>

<p style="color:#94a3b8;">
A fase eliminatória será preenchida automaticamente quando você finalizar todos os jogos da fase de grupos.
</p>

</div>
`;

</script>

</body>
</html>
