<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Copa do Mundo 2026</title>

<style>

/* FUNDO */
body{
    font-family: Arial;
    margin:0;
    background: radial-gradient(circle at top, #009c3b, #006400 80%);
    color:white;
}

/* HEADER */
header{
    background: linear-gradient(90deg, #006400, #009c3b);
    padding:15px;
    font-size:22px;
    text-align:center;
    letter-spacing:1px;
    border-bottom:3px solid #ffdf00;
    color:#ffdf00;
}

/* CARDS */
.section{
    background: rgba(0,100,0,0.9);
    padding:15px;
    margin:10px;
    border-radius:12px;
}

/* TITULO GRUPO */
h2{
    border-left:4px solid #ffdf00;
    padding-left:10px;
}

/* JOGOS */
.game{
    background:#008000;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.game:hover{
    background:#00a000;
}

/* DATA/HORA */
.hora{
    font-size:12px;
    color:#ffdf00;
}

/* INPUT */
input{
    width:42px;
    padding:5px;
    border-radius:6px;
    border:none;
    text-align:center;
    font-weight:bold;
    background:#004d00;
    color:white;
}

input:focus{
    outline:none;
    background:#ffdf00;
    color:#006400;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:12px;
}

thead{
    background:#ffdf00;
    color:#006400;
}

td, th{
    padding:10px;
    text-align:center;
}

td:first-child{
    text-align:left;
}

/* LINHAS */
tbody tr:nth-child(odd){
    background:#006400;
}
tbody tr:nth-child(even){
    background:#004d00;
}

tbody tr:hover{
    background:#009c3b;
}

/* CLASSIFICADOS */
.top{
    background:#003300 !important;
    color:#ffdf00;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    font-size:12px;
}

</style>
</head>

<body>

<header>🏆 Copa do Mundo 2026</header>

<div id="app"></div>

<footer>Desenvolvido por Bruno Mendoza</footer>

<script>

// GRUPOS
const grupos = {
A:["México","África do Sul","Coreia do Sul","Tchéquia"],
B:["Canadá","Bósnia","Catar","Suíça"],
C:["Brasil","Marrocos","Haiti","Escócia"],
D:["EUA","Paraguai","Austrália","Turquia"],
E:["Alemanha","Equador","Costa do Marfim","Curaçao"],
F:["Holanda","Japão","Suécia","Tunísia"],
G:["Bélgica","Egito","Irã","Nova Zelândia"],
H:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"],
I:["França","Senegal","Noruega","Iraque"],
J:["Argentina","Argélia","Áustria","Jordânia"],
K:["Portugal","Colômbia","Uzbequistão","Congo"],
L:["Inglaterra","Croácia","Gana","Panamá"]
};

// AGENDA (DATA + HORÁRIO)
const agenda = [
"11/06 16:00","11/06 19:00","11/06 21:30",
"12/06 16:00","12/06 19:00","12/06 21:30",
"13/06 16:00","13/06 19:00","13/06 21:30",
"14/06 16:00","14/06 19:00","14/06 21:30",
"15/06 16:00","15/06 19:00","15/06 21:30",
"16/06 16:00","16/06 19:00","16/06 21:30",
"17/06 16:00","17/06 19:00","17/06 21:30",
"18/06 16:00","18/06 19:00","18/06 21:30",
"19/06 16:00","19/06 19:00","19/06 21:30",
"20/06 16:00","20/06 19:00","20/06 21:30",
"21/06 16:00","21/06 19:00","21/06 21:30",
"22/06 16:00","22/06 19:00","22/06 21:30",
"23/06 16:00","23/06 19:00","23/06 21:30",
"24/06 16:00","24/06 19:00","24/06 21:30"
];

// STORAGE
function save(k,v){
    localStorage.setItem(k,v);
}
function get(k){
    return localStorage.getItem(k)||"";
}

// GERAR JOGOS
function gerarJogos(times){
    let jogos=[];
    for(let i=0;i<times.length;i++){
        for(let j=i+1;j<times.length;j++){
            jogos.push([times[i],times[j]]);
        }
    }
    return jogos;
}

// CALCULAR TABELA
function calcularTabela(times,grupoId){

    let tabela={};

    times.forEach(t=>{
        tabela[t]={pts:0,gp:0,gc:0};
    });

    let jogos=gerarJogos(times);

    jogos.forEach((j,i)=>{
        let a=parseInt(get(grupoId+i+"a"));
        let b=parseInt(get(grupoId+i+"b"));

        if(!isNaN(a) && !isNaN(b)){
            tabela[j[0]].gp+=a;
            tabela[j[0]].gc+=b;
            tabela[j[1]].gp+=b;
            tabela[j[1]].gc+=a;

            if(a>b) tabela[j[0]].pts+=3;
            else if(b>a) tabela[j[1]].pts+=3;
            else{
                tabela[j[0]].pts+=1;
                tabela[j[1]].pts+=1;
            }
        }
    });

    return Object.entries(tabela).sort((a,b)=>
        b[1].pts - a[1].pts ||
        ((b[1].gp-b[1].gc)-(a[1].gp-a[1].gc))
    );
}

// RENDER
let app=document.getElementById("app");
let num=1;

for(let g in grupos){

    let times=grupos[g];

    app.innerHTML+=`<div class="section"><h2>Grupo ${g}</h2>`;

    let jogos=gerarJogos(times);

    jogos.forEach((j,i)=>{

        let id=g+i;

        app.innerHTML+=`
        <div class="game">
            <span>
                (${num}) ${j[0]} x ${j[1]}<br>
                <span class="hora">📅 ${agenda[num-1]}</span>
            </span>
            <span>
                <input value="${get(id+'a')}" 
                onchange="save('${id}a',this.value);location.reload()"> x
                <input value="${get(id+'b')}" 
                onchange="save('${id}b',this.value);location.reload()">
            </span>
        </div>
        `;

        num++;
    });

    let classif=calcularTabela(times,g);

    let htmlTabela = `
    <table>
    <thead>
        <tr>
            <th>Time</th>
            <th>Pontos</th>
            <th>Saldo</th>
        </tr>
    </thead>
    <tbody>
    `;

    for(let i=0;i<classif.length;i++){

        let nome = classif[i][0];
        let dados = classif[i][1];
        let saldo = dados.gp - dados.gc;

        htmlTabela += `
        <tr class="${i<2?'top':''}">
            <td>${nome}</td>
            <td>${dados.pts}</td>
            <td>${saldo}</td>
        </tr>
        `;
    }

    htmlTabela += `</tbody></table>`;

    app.innerHTML += htmlTabela;
    app.innerHTML += `</div>`;
}

</script>

</body>
</html>
