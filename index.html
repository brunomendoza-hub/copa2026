<meta charset="UTF-8">
<title>Copa do Mundo 2026</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#020617;
    color:white;
}

header{
    text-align:center;
    padding:15px;
    font-size:22px;
    border-bottom:2px solid #22c55e;
}

.section{
    padding:12px;
}

/* JOGOS */
.game{
    background:#1e293b;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}

/* INPUT */
input{
    width:40px;
    text-align:center;
}

/* ✅ TABELA CORRETA */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td{
    border:1px solid #334155;
    padding:8px;
    text-align:center;
}

th{
    background:#22c55e;
    color:#022;
}

td:first-child{
    text-align:left;
}

/* LINHAS */
tbody tr:nth-child(odd){
    background:#1e293b;
}

tbody tr:nth-child(even){
    background:#020617;
}

/* TOP 2 */
.top{
    background:#166534 !important;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<header>🏆 Copa do Mundo 2026</header>

<div id="app"></div>

<footer>Desenvolvido por Bruno Mendoza</footer>

<script>

// ====================
// GRUPOS
// ====================
const grupos = {
A:["México","África do Sul","Coreia do Sul","Tchéquia"],
B:["Canadá","Bósnia","Catar","Suíça"],
C:["Brasil","Marrocos","Haiti","Escócia"],
D:["EUA","Paraguai","Austrália","Turquia"],
E:["Alemanha","Equador","Costa do Marfim","Curaçao"],
F:["Holanda","Japão","Suécia","Tunísia"],
G:["Bélgica","Egito","Irã","Nova Zelândia"],
H:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"],
I:["França","Senegal","Noruega","Iraque"],
J:["Argentina","Argélia","Áustria","Jordânia"],
K:["Portugal","Colômbia","Uzbequistão","Congo"],
L:["Inglaterra","Croácia","Gana","Panamá"]
};

function save(k,v){localStorage.setItem(k,v)}
function get(k){return localStorage.getItem(k)||""}

// gerar jogos
function gerarJogos(times){
    let j=[];
    for(let i=0;i<times.length;i++){
        for(let k=i+1;k<times.length;k++){
            j.push([times[i],times[k]]);
        }
    }
    return j;
}

// calcular tabela
function calcularTabela(times,id){

    let t={};

    times.forEach(x=>{
        t[x]={pts:0,gp:0,gc:0};
    });

    let jogos=gerarJogos(times);

    jogos.forEach((m,i)=>{
        let a=parseInt(get(id+i+'a'));
        let b=parseInt(get(id+i+'b'));

        if(!isNaN(a)&&!isNaN(b)){
            t[m[0]].gp+=a;
            t[m[0]].gc+=b;
            t[m[1]].gp+=b;
            t[m[1]].gc+=a;

            if(a>b) t[m[0]].pts+=3;
            else if(b>a) t[m[1]].pts+=3;
            else{
                t[m[0]].pts+=1;
                t[m[1]].pts+=1;
            }
        }
    });

    return Object.entries(t).sort((a,b)=>
        b[1].pts-a[1].pts ||
        ((b[1].gp-b[1].gc)-(a[1].gp-a[1].gc))
    );
}

// ====================
// RENDER
// ====================

let app=document.getElementById("app");
let num=1;

for(let g in grupos){

    let times=grupos[g];

    app.innerHTML+=`<div class="section"><h2>Grupo ${g}</h2>`;

    let jogos=gerarJogos(times);

    // jogos
    jogos.forEach((m,i)=>{

        let id=g+i;

        app.innerHTML+=`
        <div class="game">
            <span>(${num}) ${m[0]} x ${m[1]}</span>
            <span>
                <input value="${get(id+'a')}" onchange="save('${id}a',this.value);location.reload()"> x
                <input value="${get(id+'b')}" onchange="save('${id}b',this.value);location.reload()">
            </span>
        </div>
        `;

        num++;
    });

    // 🔥 TABELA CORRETA
    let classif=calcularTabela(times,g);

    let tabelaHTML = `
    <table>
    <thead>
        <tr>
            <th>Time</th>
            <th>Pontos</th>
            <th>Saldo</th>
        </tr>
    </thead>
    <tbody>
    `;

    for(let i=0;i<classif.length;i++){

        let nome = classif[i][0];
        let dados = classif[i][1];

        let saldo = dados.gp - dados.gc;

        tabelaHTML += `
        <tr class="${i<2?'top':''}">
            <td>${nome}</td>
            <td>${dados.pts}</td>
            <td>${saldo}</td>
        </tr>
        `;
    }

    tabelaHTML += `</tbody></table>`;

    app.innerHTML += tabelaHTML;

    app.innerHTML += `</div>`;
}

</script>

</body>
</html>
