<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Copa do Mundo 2026 🇧🇷</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #006400, #009c3b);
    color: white;
    text-align: center;
    margin: 0;
  }

  h1 {
    background-color: #ffdf00;
    color: #006400;
    padding: 15px;
    margin: 0;
  }

  table {
    margin: 30px auto;
    border-collapse: collapse;
    width: 80%;
    max-width: 600px;
    background-color: #008000;
    border-radius: 15px;
    overflow: hidden;
  }

  th {
    background-color: #ffdf00;
    color: #006400;
    padding: 12px;
    font-size: 18px;
  }

  td {
    padding: 15px;
    font-size: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
  }

  tr:hover {
    background-color: #00a000;
    cursor: pointer;
  }

  .horario {
    font-weight: bold;
    color: #ffdf00;
  }

  .brasil {
    background-color: #004d00;
  }
</style>

</head>

<body>

<h1>⚽ Tabela da Copa 2026 🇧🇷</h1>

<table>
  <tr>
    <th>Time</th>
    <th>Horário</th>
    <th>Time</th>
  </tr>

  <tr class="brasil">
    <td>Brasil 🇧🇷</td>
    <td class="horario">19:00</td>
    <td>Marrocos 🇲🇦</td>
  </tr>

  <tr>
    <td>Haiti 🇭🇹</td>
    <td class="horario">21:30</td>
    <td>Escócia 🏴</td>
  </tr>

  <tr class="brasil">
    <td>Brasil 🇧🇷</td>
    <td class="horario">21:30</td>
    <td>Haiti 🇭🇹</td>
  </tr>

  <tr class="brasil">
    <td>Brasil 🇧🇷</td>
    <td class="horario">19:00</td>
    <td>Escócia 🏴</td>
  </tr>

</table>

</body>
</html>
