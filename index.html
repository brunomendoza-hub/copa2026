<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Copa do Mundo 2026</title>

<style>

/* FUNDO */
body{
    font-family: Arial;
    margin:0;
    background: radial-gradient(circle at top, #009c3b, #006400 80%);
    color:white;
}

/* HEADER */
header{
    background: linear-gradient(90deg, #006400, #009c3b);
    padding:15px;
    text-align:center;
    border-bottom:3px solid #ffdf00;
    color:#ffdf00;
}

/* ANIMAÇÃO */
@keyframes aparecer{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* CARDS */
.section{
    background: rgba(0,100,0,0.9);
    padding:15px;
    margin:10px;
    border-radius:12px;
    animation: aparecer 0.4s ease;
}

/* TITULO */
h2{
    border-left:4px solid #ffdf00;
    padding-left:10px;
}

/* JOGO */
.game{
    background:#008000;
    padding:10px 15px;
    margin:8px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    animation: aparecer 0.3s ease;
}

.hora{
    color:#ffdf00;
    font-size:12px;
}

/* INPUT */
input{
    width:42px;
    text-align:center;
    background:#006400;
    color:white;
    border:1px solid #ffdf00;
}

input:focus{
    background:#ffdf00;
    color:#006400;
}

/* TABELA */
table{
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}

thead{
    background:#ffdf00;
    color:#006400;
}

td, th{
    padding:8px;
    border:1px solid rgba(255,255,255,0.2);
}

tbody tr:nth-child(odd){background:#006400;}
tbody tr:nth-child(even){background:#004d00;}

.top{
    background:#003300 !important;
    color:#ffdf00;
}

footer{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<header>🏆 Copa do Mundo 2026</header>
<div id="app"></div>
<footer>Desenvolvido por Bruno Mendoza</footer>

<script>

// GRUPOS
const grupos = {
A:["México","África do Sul","Coreia do Sul","Tchéquia"],
B:["Canadá","Bósnia","Catar","Suíça"],
C:["Brasil","Marrocos","Haiti","Escócia"],
D:["EUA","Paraguai","Austrália","Turquia"],
E:["Alemanha","Equador","Costa do Marfim","Curaçao"],
F:["Holanda","Japão","Suécia","Tunísia"],
G:["Bélgica","Egito","Irã","Nova Zelândia"],
H:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"],
I:["França","Senegal","Noruega","Iraque"],
J:["Argentina","Argélia","Áustria","Jordânia"],
K:["Portugal","Colômbia","Uzbequistão","Congo"],
L:["Inglaterra","Croácia","Gana","Panamá"]
};

// ✅ JOGOS POR GRUPO (ORDEM FIFA)
const jogosFixos = {
A:[
["México","África do Sul"],
["Coreia do Sul","Tchéquia"],
["Tchéquia","África do Sul"],
["México","Coreia do Sul"],
["Tchéquia","México"],
["África do Sul","Coreia do Sul"]
],

B:[
["Canadá","Bósnia"],
["Catar","Suíça"],
["Suíça","Bósnia"],
["Canadá","Catar"],
["Bósnia","Catar"],
["Suíça","Canadá"]
],

C:[
["Brasil","Marrocos"],
["Haiti","Escócia"],
["Escócia","Marrocos"],
["Brasil","Haiti"],
["Marrocos","Haiti"],
["Escócia","Brasil"]
],

// pode manter padrão pros outros (ou definir depois)
};

// ✅ AGENDA (AGORA CASA COM JOGO CERTO)
const agenda = {
"A0":"11/06 16:00","A1":"11/06 23:00","A2":"18/06 13:00","A3":"18/06 22:00","A4":"24/06 22:00","A5":"24/06 22:00",
"B0":"12/06 16:00","B1":"13/06 16:00","B2":"18/06 16:00","B3":"18/06 19:00","B4":"24/06 16:00","B5":"24/06 16:00",
"C0":"13/06 19:00","C1":"13/06 22:00","C2":"19/06 19:00","C3":"19/06 22:00","C4":"24/06 19:00","C5":"24/06 19:00"
};

// STORAGE
function save(k,v){localStorage.setItem(k,v);}
function get(k){return localStorage.getItem(k)||"";}

// CALCULAR TABELA
function calcularTabela(times,grupoId){
    let tabela={};
    times.forEach(t=>{tabela[t]={pts:0,gp:0,gc:0};});

    let jogos=jogosFixos[grupoId] || [];

    jogos.forEach((j,i)=>{
        let a=parseInt(get(grupoId+i+"a"));
        let b=parseInt(get(grupoId+i+"b"));

        if(!isNaN(a) && !isNaN(b)){
            tabela[j[0]].gp+=a;
            tabela[j[0]].gc+=b;
            tabela[j[1]].gp+=b;
            tabela[j[1]].gc+=a;

            if(a>b) tabela[j[0]].pts+=3;
            else if(b>a) tabela[j[1]].pts+=3;
            else{
                tabela[j[0]].pts+=1;
                tabela[j[1]].pts+=1;
            }
        }
    });

    return Object.entries(tabela).sort((a,b)=>
        b[1].pts - a[1].pts ||
        ((b[1].gp-b[1].gc)-(a[1].gp-a[1].gc))
    );
}

// RENDER
let app=document.getElementById("app");
let num=1;

for(let g in grupos){

    let times=grupos[g];
    let jogos=jogosFixos[g];

    if(!jogos) continue; // só mostra grupos definidos corretamente

    app.innerHTML+=`<div class="section"><h2>Grupo ${g}</h2>`;

    jogos.forEach((j,i)=>{

        let id=g+i;

        app.innerHTML+=`
        <div class="game">
            <span>
                (${num}) ${j[0]} x ${j[1]}<br>
                <span class="hora">📅 ${agenda[id]}</span>
            </span>
            <span>
                <input value="${get(id+'a')}" 
                onchange="save('${id}a',this.value);location.reload()"> x
                <input value="${get(id+'b')}" 
                onchange="save('${id}b',this.value);location.reload()">
            </span>
        </div>
        `;

        num++;
    });

    let classif=calcularTabela(times,g);

    let htmlTabela = `
    <table>
    <thead>
        <tr>
            <th>Time</th>
            <th>Pontos</th>
            <th>Saldo</th>
        </tr>
    </thead>
    <tbody>
    `;

    for(let i=0;i<classif.length;i++){
        let nome = classif[i][0];
        let dados = classif[i][1];
        let saldo = dados.gp - dados.gc;

        htmlTabela += `
        <tr class="${i<2?'top':''}">
            <td>${nome}</td>
            <td>${dados.pts}</td>
            <td>${saldo}</td>
        </tr>
        `;
    }

    htmlTabela += `</tbody></table>`;
    app.innerHTML += htmlTabela;
    app.innerHTML += `</div>`;
}

</script>

</body>
</html>
